syntax = "proto3";
import "google/protobuf/wrappers.proto";
option csharp_namespace = "API_Gateway.Controllers";

package generalProtos;

message pBoolReply{
	bool result = 1;
}

message pTicket{
	int64 id = 1;
	int64 ticketnr = 2;
	string topic = 3;
	string name = 4;
	string firstname = 5;
	string email = 6;
	pPriority priority = 7;
	string text = 8;
	google.protobuf.Int32Value supporterid = 9;
	string created = 10;
}

enum pPriority{
	NON_VALUE = 0;
	SEHR_NIEDRIG = 1;
	NIEDRIG = 2;
	MITTEL = 3;
	HOCH = 4;
	SEHR_HOCH = 5;
}